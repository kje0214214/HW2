name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        # GitHub Repository Secrets 메뉴에 DOCKERHUB_USERNAME, DOCKERHUB_TOKEN이 저장되어 있어야 합니다.
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # 태그 이름은 DOCKERHUB ID 하위의 sentiment-diary 로 고정합니다.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/sentiment-diary:latest
          # 빌드 시간 단축을 위해 캐시를 사용
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/sentiment-diary:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/sentiment-diary:buildcache,mode=max
